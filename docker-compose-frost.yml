# FROST Server + PostGIS for Annals (ISPRA) data publication.
#
# Start this stack first and keep it running:
#   docker compose -f docker-compose-frost.yml up -d
#
# Reset the database:
#   docker compose -f docker-compose-frost.yml down -v
#
# Override ANNALS_DATA_BASE_URL for the public FROST service root URL.
services:
  frost-server:
    image: fraunhoferiosb/frost-server:2.6
    container_name: frost-server
    environment:
      - serviceRootUrl=${ANNALS_DATA_BASE_URL:-http://localhost:8082}/FROST-Server
      - plugins_multiDatastream.enable=false
      - http_cors_enable=true
      - http_cors_allowed_origins=*
      - persistence_db_driver=org.postgresql.Driver
      - persistence_db_url=jdbc:postgresql://database:5432/sensorthings
      - persistence_db_username=sensorthings
      - persistence_db_password=ChangeMe
      - persistence_autoUpdateDatabase=true
      - persistence.idGenerationMode=ServerAndClientGenerated
      - persistence_db_conn_max=40
      - persistence_db_conn_idle_max=30
      # FROST logging (see https://fraunhoferiosb.github.io/FROST-Server/deployment/docker.html)
      # For batch/json debugging: FROST_LL=DEBUG FROST_LL_service=DEBUG
      - FROST_LL=${FROST_LL:-INFO}
      - FROST_LL_service=${FROST_LL_SERVICE:-INFO}
      - FROST_LL_parser=${FROST_LL_PARSER:-INFO}
    ports:
      - 8082:8080
      - 8885:1883
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/FROST-Server/v1.1/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    # Compose waits until database healthcheck passes before starting FROST.
    depends_on:
      database:
        condition: service_healthy
    networks:
      - annals-frost-net

  database:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_DB=sensorthings
      - POSTGRES_USER=sensorthings
      - POSTGRES_PASSWORD=ChangeMe
    volumes:
      - annals-postgis-data:/var/lib/postgresql/data
      - ./scripts/postgres-healthcheck.sh:/usr/local/bin/postgres-healthcheck.sh:ro
    healthcheck:
      # pg_isready alone is not enough on first boot: PostGIS init runs Postgres,
      # loads extensions, stops ("init process complete"), then starts for real.
      # See scripts/postgres-healthcheck.sh
      test: ["CMD", "postgres-healthcheck.sh"]
      interval: 3s
      timeout: 30s
      retries: 40
      start_period: 30s
    restart: "no"
    networks:
      - annals-frost-net

networks:
  annals-frost-net:
    name: annals-frost-net

volumes:
  annals-postgis-data:
