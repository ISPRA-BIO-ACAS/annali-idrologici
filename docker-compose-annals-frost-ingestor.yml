# Annals FROST ingestor: upload mapped STA data to FROST Server.
#
# Prerequisite: prepared and mapped data under ./data/processed/:
#   docker compose -f docker-compose-annals-prepare.yml up --build
#
# Prerequisite: FROST Server stack running on network annals-frost-net:
#   docker compose -f docker-compose-frost.yml up -d
#
# Run the ingestor:
#   docker compose -f docker-compose-annals-frost-ingestor.yml up --build
services:
  annals-frost-ingestor:
    build:
      context: ./ingestor-frost
      dockerfile: Dockerfile
    entrypoint: ["java", "-cp", "/app/ingestor-1.0-SNAPSHOT.jar:/app/dependency/*", "eu.flora.essi.ingestor.annals.AnnalsIngestor"]
    environment:
      - FROST_BASE_URL=${FROST_BASE_URL:-http://frost-server:8080}
      - ANNALS_DATA_FOLDER=${ANNALS_DATA_FOLDER:-/data}
      - ANNALS_LOCAL_FOLDER=${ANNALS_LOCAL_FOLDER:-/data/processed}
      - ANNALS_PREPARE=${ANNALS_PREPARE:-false}
      - ANNALS_MAP=${ANNALS_MAP:-false}
      - ANNALS_UPLOAD=${ANNALS_UPLOAD:-true}
      - ANNALS_UPLOAD_STRATEGY=${ANNALS_UPLOAD_STRATEGY:-DETERMINISTIC_ID}
      - ANNALS_UPLOAD_PARALLELISM=${ANNALS_UPLOAD_PARALLELISM:-1}
      - ANNALS_UPLOAD_VERBOSE=${ANNALS_UPLOAD_VERBOSE:-false}
      - ANNALS_USE_GZIP=${ANNALS_USE_GZIP:-false}
      - ANNALS_LOG_REQUESTS=${ANNALS_LOG_REQUESTS:-false}
    volumes:
      - ./data:/data
    networks:
      - annals-frost-net
    restart: "no"

networks:
  annals-frost-net:
    external: true
