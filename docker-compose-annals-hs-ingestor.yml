# Annals HydroServer ingestor: load prepared CSV data into HydroServer.
#
# Prerequisite: prepared data under ./data/processed/:
#   docker compose -f docker-compose-annals-prepare.yml up --build
#
# Local HydroServer stack (optional if HYDROSERVER_URL points elsewhere):
#   docker compose -f docker-compose-hydroserver.yml up -d
#
# Run against the local stack (default URL uses the published port on the host):
#   docker compose -f docker-compose-annals-hs-ingestor.yml up --build
#
# Run against a different HydroServer:
#   HYDROSERVER_URL=https://my-hydroserver.example.com \
#   HYDROSERVER_EMAIL=you@example.com \
#   HYDROSERVER_PASSWORD=secret \
#   docker compose -f docker-compose-annals-hs-ingestor.yml up --build
services:
  annals-hs-ingestor:
    build:
      context: ./ingestor-hydroserver
      dockerfile: Dockerfile
    environment:
      # Base URL of the target HydroServer (no trailing path required)
      - HYDROSERVER_URL=${HYDROSERVER_URL:-http://host.docker.internal:8000}
      # Admin credentials created by hydroserver-init (setup_admin_user), or your remote account
      - HYDROSERVER_EMAIL=${HYDROSERVER_EMAIL:-enrico.boldrini@cnr.it}
      - HYDROSERVER_PASSWORD=${HYDROSERVER_PASSWORD:-changeme123!}
      # Root data folder: metadata CSVs at /data, regional CSVs under /data/processed/
      - HS_DATA_DIR=${HS_DATA_DIR:-/data}
      - HS_WORKSPACE_NAME=${HS_WORKSPACE_NAME:-Annali}
      - HS_FAST=${HS_FAST:-false}
    extra_hosts:
      # So the default HYDROSERVER_URL can reach the host-published HydroServer port (Linux)
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    restart: "no"
